<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="sign-contract-document-with-pen-icon-3d-illustration.png">

    <title>Cadastro</title>
</head>

<body>

    <form action="">
        <div class="forms">
            <h1>Cadastro</h1>
            <label for="nome"><span>* </span>Nome completo:</label>
            <input type="text" id="nome" name="nomeCompleto" placeholder="Ex: Bruno Santos" required maxlength="255">

            <label for="genero">Gênero:</label>
            <select id="genero" name="Genero">
                <option value="masculino">Masculino</option>
                <option value="feminino">Feminino</option>
                <option value="naoinformar" selected>Prefiro não informar</option>
            </select>

            <label for="cpf"><span>*</span>CPF:</label>
            <input type="text" id="cpf" maxlength="14" name="CPF" placeholder="011.011.011-02" required>

            <label for="rg"><span>*</span>RG:</label>
            <input type="text" id="rg" name="RG" maxlength="12" placeholder="Ex: 00.00.000-02" required>
            <label for="dataNascimento"><span>*</span>Data de Nascimento:</label>
            <div class="container">
                <select class="bb" id="dia"></select>
                <select class="bb" id="mes"></select>
                <select class="bb" id="ano"></select>
            </div>
            <label for="telefone"><span>*</span>Telefone:</label>
            <input type="tel" name="telefone" id="telefone" placeholder="Ex:(41) 98840-1563" required maxlength="15">

            <label for="estadocivil"><span>*</span>Estado Civil:</label>
            <select name="estadocivil" id="estadocivil">
                <option value="selecione" selected disabled>Selecione</option>
                <option value="casado">Casado</option>
                <option value="solteiro">Solteiro</option>
                <option value="viuvo">Viúvo</option>
            </select>

            <label for="cep"><span>*</span>CEP:</label>
            <input type="text" id="CEP" name="CEP" placeholder="00000-000" required maxlength="9">

            <label for="estado"><span>*</span>Estado:</label>
            <input type="text" name="estado" maxlength="18" id="estado" placeholder="Ex: Paraná" required>

            <label for="cidade"><span>*</span>Cidade:</label>
            <input type="text" name="cidade" id="cidade" placeholder="Ex: Piraquara" required>

            <label for="bairro"><span>*</span>Bairro:</label>
            <input type="text" name="bairro" id="bairro" placeholder="Ex: Vila Juliana" required>

            <label for="rua"><span>*</span>Rua:</label>
            <input type="text" name="rua" id="rua" placeholder="Ex: Peroba" required>

            <label for="numerohome">Número:</label>
            <input type="text" name="numerohome" id="numerohome" placeholder="Ex: 67">

            <fieldset>
                <legend>Pessoa com Deficiência</legend>
                <div>
                    <input type="radio" id="sim" value="sim" name="escolha">
                    <label for="sim">Sim</label>
                </div>
                <div>
                    <input type="radio" id="nao" value="nao" name="escolha" checked>
                    <label for="nao">Não</label>
                </div>
            </fieldset>
            <div>
                <input type="submit" id="cancel" value="Cancelar">
                <input type="submit" id="enviar" value="Enviar">
            </div>
        </div>
    </form>

    <script>

        // Dias loop
        for (let i = 1; i <= 31; i++) {
            dia.innerHTML += `<option>${i}</option>`;
        }

        // Meses arr
        const meses = ["Jan", "Fev", "Mar", "Abr", "Mai", "Jun", "Jul", "Ago", "Set", "Out", "Nov", "Dez"];
        meses.forEach((m, i) => {
            mes.innerHTML += `<option value="${i + 1}">${m}</option>`;
        });

        // Anos loop
        for (let i = 2026; i >= 1944; i--) {
            ano.innerHTML += `<option>${i}</option>`;
        }
    </script>
</body>

</html>
